# TriAttention single-prompt config (Setting 2) -- 120-frame generation
# Runs LongLive's causal inference pipeline on a single prompt per sample,
# with TriAttention pruning roughly 50% of tokens from the local-attention window.
#
# To run:
#   python -m longlive.run --config_path longlive/configs/triattention_120f.yaml
#
# Key ideas:
#   - Compression runs on top of LongLive's local attention (local_attn_size > 0).
#   - The KV budget must be strictly smaller than local_attn_size * frame_seq_length
#     (otherwise compression is a no-op). Here: 9360 < 12 * 1560 = 18720 (50%).
#   - Calibration statistics are domain-agnostic and shipped in-repo; no
#     separate calibrate step is required.

denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true
num_frame_per_block: 3
model_name: Wan2.1-T2V-1.3B

model_kwargs:
  # Local attention window the compressor prunes from.
  local_attn_size: 12
  timestep_shift: 5.0
  sink_size: 3

  # TriAttention KV compression
  kv_compression_mode: compress
  kv_stats_path: longlive/assets/calibration_stats_81f.pt
  kv_budget_tokens: 9360           # 50% of local-attention window (12 * 1560 = 18720 tokens)
  kv_compress_every_n_frames: 3
  kv_keep_last_frames: 3
  kv_pruning_mode: layer_perhead
  kv_score_aggregation: mean
  kv_perhead_layer_aggregation: mean_of_layer_max
  kv_offset_max_frames: 128
  kv_normalize_scores: true
  kv_tie_break_noise: true
  kv_tie_break_noise_scale: 1.0e-6
  kv_random_seed: 0

# Inference settings
data_path: example/quick_test_prompt.txt
output_folder: videos/triattention_120f
inference_iter: 0
num_output_frames: 120
use_ema: false
seed: 0
num_samples: 1
save_with_index: true
global_sink: true
context_noise: 0

generator_ckpt: longlive_models/models/longlive_base.pt
lora_ckpt: longlive_models/models/lora.pt

adapter:
  type: "lora"
  rank: 256
  alpha: 256
  dropout: 0.0
  dtype: "bfloat16"
  verbose: false
